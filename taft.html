<h1>ויליאם הווארד טאפט</h1>

<p><strong>שנות חיים:</strong> 1857–1930</p>

<h2>תרומה מרכזית</h2>
<p>
טאפט היה הנשיא שהקים את חדר הסגלגל הראשון בשנת 1909,
ובכך יצר את משרד הנשיאות המודרני.
</p>

<h2>משמעות היסטורית</h2>
<p>
הוא הפך את הנשיאות ממוסד טקסי למרכז ניהולי פעיל,
עם משרד קבוע ומובנה.
</p>
