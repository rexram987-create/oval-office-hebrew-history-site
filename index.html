<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חדר הסגלגל – ציר זמן אינטראקטיבי</title>

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* HEADER */
header {
  height: 60vh;
  background:
    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.8)),
    url("images/oval-office-front-view.png") center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

header h1 { font-size: 60px; }

/* NAV */
nav {
  position: sticky;
  top: 0;
  background: #020617;
  display: flex;
  gap: 10px;
  padding: 12px;
  overflow-x: auto;
}

nav a {
  background: #1e293b;
  padding: 10px 18px;
  border-radius: 999px;
  text-decoration: none;
  color: white;
}

nav a:hover { background: #38bdf8; color: black; }

/* CONTENT */
main { padding: 20px; max-width: 1000px; margin: auto; }

section {
  background: #111827;
  padding: 25px;
  border-radius: 20px;
  margin-bottom: 40px;
}

h2 { color: #38bdf8; }

/* TIMELINE */
.timeline {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 20px 0;
}

.timeline-item {
  min-width: 120px;
  padding: 10px;
  background: #1e293b;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.timeline-item.active {
  background: #38bdf8;
  color: black;
}

.timeline-content {
  margin-top: 20px;
  padding: 20px;
  background: #020617;
  border-radius: 15px;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 15px;
  cursor: pointer;
}

/* LIGHTBOX */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.9);
  justify-content: center;
  align-items: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
}

</style>
</head>

<body>

<header>
  <h1>חדר הסגלגל</h1>
</header>

<nav>
  <a href="#home">ראשי</a>
  <a href="#timeline">ציר זמן</a>
</nav>

<main>

<section id="home">
<h2>מבוא</h2>
<p>
חדר הסגלגל הוא אחד הסמלים הפוליטיים החשובים בעולם.
</p>
<img src="images/oval-office-front-view.png" onclick="openImg(this)">
</section>

<section id="timeline">
<h2>ציר זמן אינטראקטיבי</h2>

<div class="timeline">

<div class="timeline-item active" onclick="showEvent(0)">1909</div>
<div class="timeline-item" onclick="showEvent(1)">1934</div>
<div class="timeline-item" onclick="showEvent(2)">1962</div>
<div class="timeline-item" onclick="showEvent(3)">1969</div>
<div class="timeline-item" onclick="showEvent(4)">1974</div>
<div class="timeline-item" onclick="showEvent(5)">2001</div>

</div>

<div id="timeline-content" class="timeline-content">
</div>

</section>

</main>

<div id="lightbox" onclick="closeImg()">
<img id="lightbox-img">
</div>

<script>

const events = [
{
title: "1909 – הקמת החדר",
text: "החדר נבנה לראשונה בתקופת הנשיא טאפט כחלק מהאגף המערבי."
},
{
title: "1934 – מיקום חדש",
text: "רוזוולט מעביר את החדר למיקומו הנוכחי."
},
{
title: "1962 – משבר קובה",
text: "החלטות גורליות התקבלו כאן במהלך המשבר הגרעיני."
},
{
title: "1969 – נחיתה על הירח",
text: "ניקסון מדבר עם האסטרונאוטים."
},
{
title: "1974 – התפטרות ניקסון",
text: "אירוע דרמטי בהיסטוריה האמריקאית."
},
{
title: "2001 – פיגועי 11 בספטמבר",
text: "החדר הפך למוקד קבלת החלטות בזמן חירום."
}
];

function showEvent(index) {

document.querySelectorAll(".timeline-item").forEach(el => el.classList.remove("active"));
document.querySelectorAll(".timeline-item")[index].classList.add("active");

document.getElementById("timeline-content").innerHTML =
"<h3>" + events[index].title + "</h3><p>" + events[index].text + "</p>";
}

// INIT
showEvent(0);

function openImg(img){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=img.src;
}

function closeImg(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
